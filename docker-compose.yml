
services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memdash}
      POSTGRES_USER: ${POSTGRES_USER:-memdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memdash}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # FastAPI Backend
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-18000}:3000"
    env_file: .env
    environment:
      # Override DATABASE_URL so the backend reaches the db service by name
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-memdash}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-memdash}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Frontend (Streamlit / Next.js – built separately)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8510:8510"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
